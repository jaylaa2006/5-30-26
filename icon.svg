<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0A1525"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer glow -->
  <circle cx="256" cy="230" r="180" fill="rgba(212,168,67,0.06)"/>
  <!-- Ankh symbol -->
  <g transform="translate(256,256) scale(1.8)">
    <!-- Loop (oval top) -->
    <ellipse cx="0" cy="-60" rx="35" ry="45" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="-45" y1="-15" x2="45" y2="-15" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
    <!-- Vertical bar -->
    <line x1="0" y1="-15" x2="0" y2="70" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="256" y="470" text-anchor="middle" font-family="serif" font-weight="bold" font-size="36" fill="#D4A843" letter-spacing="4">PER ANKH</text>
</svg>
